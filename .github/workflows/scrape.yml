name: Nekto scrape

on:
  schedule:
    - cron: '*/10 * * * *' # Запуск каждые ~10 минут
  workflow_dispatch: # Позволяет запускать кнопку вручную

permissions:
  contents: write # Разрешение на пуш в репозиторий

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium --with-deps

      - name: Run scraper
        run: python scraper.py

      - name: Commit and Push data
        run: |
          # Настраиваем бота для коммита
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data.json
          
          # Если изменений нет (например сайт упал и онлайн тот же), коммит не создаст ошибку
          git diff --cached --quiet || git commit -m "Update online stats"
          git push
