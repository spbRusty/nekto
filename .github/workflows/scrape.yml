# .github/workflows/scrape.yml
name: Nekto scrape
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Run scraper loop (6x every 10 min)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          for i in $(seq 1 6); do
            echo "=== Run $i ==="
            python scraper.py
            git add data.json
            git diff --cached --quiet || git commit -m "update data $i"
            [ $i -lt 6 ] && sleep 600
          done

      - name: Push
        run: git push

          git add data.json
          git commit -m "update data" || exit 0
          git push
